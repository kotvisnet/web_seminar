<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EcoTrack — О сервисе</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="app">
    <header class="simple-header">
      <a class="btn btn-ghost" href="index.html">← На главную</a>
      <a class="btn btn-ghost" href="dropoff.html">Сдать отходы</a>
    </header>

    <section class="card">
      <h2>О сайте EcoTrack</h2>
      <p>EcoTrack помогает сдавать отходы, получать эко-баллы и отслеживать личный вклад.</p>
    </section>

    <section class="card">
      <h3>Пункты сбора</h3>
      <form id="nearest-form" class="grid-form user-form">
        <input id="nearest-city" placeholder="Введите город" required />
        <button class="btn" type="submit">Найти</button>
      </form>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Название</th><th>Город</th><th>Адрес</th></tr></thead>
          <tbody id="points-body"></tbody>
        </table>
      </div>
    </section>
  </main>
  <script src="js/main.js"></script>
</body>
</html>
